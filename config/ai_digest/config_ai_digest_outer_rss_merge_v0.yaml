claude:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com/anthropic"
  model: "deepseek-v4-flash"
  thinking: "disabled"

digest:
  recent_days: 4
  cache_path: ".cache/digest_me_cache.json"
  classification_batch_size: 30
  summarization_batch_size: 5
  enable_trend_summary: true
  prompts_module: "prompts_ai_digest"
  enrich_content: true
  enrich_min_chars: 500

output:
  base_dir: "./output/ai_digest"
  output_format: "both"
  pages_url: "https://aphroditee666.github.io/DigestMe/output/ai_digest"

schedule:
  days: ["monday", "thursday"]
  time: "09:00"
