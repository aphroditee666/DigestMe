claude:
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com/anthropic"
  # 可切换为 "deepseek-v4-flash" 或 "deepseek-v4-pro"
  model: "deepseek-v4-flash"
  thinking: "disabled"

digest:
  recent_days: 3
  cache_path: ".cache/digest_me_cache.json"
  classification_batch_size: 30
  prompts_module: "prompts_ai_digest"

output:
  base_dir: "./output"

schedule:
  days: ["monday", "thursday"]
  time: "09:00"
