name: AI Digest

on:
  schedule:
    # 每周一、四 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * 1,4'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: digest-cache-${{ github.ref_name }}

      - name: Inject API key
        run: |
          sed -i 's|sk-e64ae321e3de40dea7c8d60185729f54|${DEEPSEEK_API_KEY}|g' \
            config/ai_digest/config_ai_digest_outer_rss_merge_v0.yaml

      - name: Run digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py --once --config config/ai_digest/config_ai_digest_outer_rss_merge_v0.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: AI digest $(date +%Y-%m-%d)"
            git push
          fi
